# Alembic configuration for Sacramento WCAG Pipeline
#
# Database URL is read from settings at runtime (env.py), NOT from this file.
# This avoids storing credentials in version control.

[alembic]
script_location = services/common/migrations
prepend_sys_path = .

# Template for new migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
