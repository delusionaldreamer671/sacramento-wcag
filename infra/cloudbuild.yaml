###############################################################################
# Sacramento County WCAG PDF Remediation Pipeline
# GCP Cloud Build CI/CD Configuration
#
# Triggered by pushes to main branch (configure in Cloud Build triggers UI).
#
# Pipeline stages:
#   1. Validate — lint and typecheck Python source
#   2. Test    — run pytest suite
#   3. Build   — build Docker images for all 4 services (parallel)
#   4. Push    — push all images to GCR (parallel)
#   5. Deploy  — deploy all Cloud Run services (parallel, after push)
#   6. Verify  — smoke test health endpoints on all deployed services
#
# Substitution variables (set in Cloud Build trigger or gcloud builds submit):
#   _PROJECT_ID       — GCP project ID (defaults to $PROJECT_ID from Cloud Build env)
#   _REGION           — Cloud Run region (default: us-central1)
#   _ENVIRONMENT      — deployment environment: dev/staging/prod (default: dev)
#   _GCR_HOSTNAME     — GCR hostname (default: gcr.io)
#
# Secrets (configured in Secret Manager, referenced via secretEnv):
#   ADOBE_CLIENT_ID       — Adobe Acrobat Services client ID
#   ADOBE_CLIENT_SECRET   — Adobe Acrobat Services client secret
#
# IMPORTANT: Never add secrets as plain substitution variables (_VAR).
#            Always use secretEnv + availableSecrets from Secret Manager.
###############################################################################

substitutions:
  _PROJECT_ID: ${PROJECT_ID}        # Cloud Build injects PROJECT_ID automatically
  _REGION: "us-central1"
  _ENVIRONMENT: "dev"
  _GCR_HOSTNAME: "gcr.io"
  # Image tag is the short git commit SHA — guarantees unique, traceable image tags
  # COMMIT_SHA is injected by Cloud Build from the triggering commit
  _IMAGE_TAG: ${COMMIT_SHA}

# Available secrets from Secret Manager.
# Secrets are mounted into build steps via secretEnv.
# These names must match Secret Manager secret IDs in your GCP project.
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/adobe-client-id/versions/latest
      env: ADOBE_CLIENT_ID
    - versionName: projects/${PROJECT_ID}/secrets/adobe-client-secret/versions/latest
      env: ADOBE_CLIENT_SECRET

options:
  # Use a machine with more RAM for parallel Docker builds (4x images simultaneously)
  machineType: "E2_HIGHCPU_8"

  # Log streaming: CLOUD_LOGGING_ONLY reduces costs vs. storing logs in GCS
  logging: CLOUD_LOGGING_ONLY

  # Dynamic substitutions allow ${COMMIT_SHA} to reference Cloud Build built-ins
  dynamic_substitutions: true

steps:
  ###############################################################################
  # Stage 1: Validate — Python lint and type checking
  # Runs first so we fail fast before building images.
  # Uses a standard Python image — no need to build the project image first.
  ###############################################################################

  - id: "lint"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet ruff mypy pydantic-settings \
          google-cloud-storage google-cloud-pubsub google-cloud-aiplatform \
          fastapi uvicorn httpx pydantic && \
        echo "--- Running ruff linter ---" && \
        ruff check services/ && \
        echo "--- Running mypy type checker ---" && \
        mypy services/ \
          --ignore-missing-imports \
          --python-version 3.11 \
          --no-error-summary || true
        # mypy errors are reported but non-blocking during POC phase.
        # Remove "|| true" to enforce strict typing before production release.
    waitFor: ["-"]  # Run immediately, no dependencies

  ###############################################################################
  # Stage 2: Test — pytest
  # Runs after lint. Adobe and Vertex calls are mocked in tests.
  ###############################################################################

  - id: "test"
    name: "python:3.11-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet -r requirements.txt pytest pytest-asyncio pytest-cov && \
        pytest tests/ \
          --tb=short \
          --cov=services \
          --cov-report=term-missing \
          --cov-fail-under=70 \
          -q
        # 70% coverage threshold enforced — matches NFR for POC.
        # Raise to 85% before production release.
    waitFor: ["lint"]

  ###############################################################################
  # Stage 3: Build Docker images (parallel)
  # All 4 services use the same Dockerfile with SERVICE_NAME build arg.
  # Images are tagged with the commit SHA for traceability.
  # Also tagged with :latest so `terraform apply` without a specific tag works.
  ###############################################################################

  - id: "build-ingestion"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg=SERVICE_NAME=ingestion"
      - "--tag=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ingestion:${_IMAGE_TAG}"
      - "--tag=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ingestion:latest"
      # Use BuildKit for faster, cache-efficient builds
      - "--cache-from=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ingestion:latest"
      - "--file=infra/Dockerfile"
      - "."   # Build context is repo root so COPY services/ works
    env:
      - "DOCKER_BUILDKIT=1"
    waitFor: ["test"]

  - id: "build-extraction"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg=SERVICE_NAME=extraction"
      - "--tag=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-extraction:${_IMAGE_TAG}"
      - "--tag=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-extraction:latest"
      - "--cache-from=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-extraction:latest"
      - "--file=infra/Dockerfile"
      - "."
    env:
      - "DOCKER_BUILDKIT=1"
    waitFor: ["test"]

  - id: "build-ai-drafting"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg=SERVICE_NAME=ai-drafting"
      - "--tag=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ai-drafting:${_IMAGE_TAG}"
      - "--tag=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ai-drafting:latest"
      - "--cache-from=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ai-drafting:latest"
      - "--file=infra/Dockerfile"
      - "."
    env:
      - "DOCKER_BUILDKIT=1"
    waitFor: ["test"]

  - id: "build-recompilation"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg=SERVICE_NAME=recompilation"
      - "--tag=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-recompilation:${_IMAGE_TAG}"
      - "--tag=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-recompilation:latest"
      - "--cache-from=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-recompilation:latest"
      - "--file=infra/Dockerfile"
      - "."
    env:
      - "DOCKER_BUILDKIT=1"
    waitFor: ["test"]

  ###############################################################################
  # Stage 4: Push images to GCR (parallel after build)
  # Each push step runs as soon as its corresponding build step finishes.
  # SHA-tagged image is canonical; :latest is updated for cache-from efficiency.
  ###############################################################################

  - id: "push-ingestion"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ingestion"]
    waitFor: ["build-ingestion"]

  - id: "push-extraction"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-extraction"]
    waitFor: ["build-extraction"]

  - id: "push-ai-drafting"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ai-drafting"]
    waitFor: ["build-ai-drafting"]

  - id: "push-recompilation"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-recompilation"]
    waitFor: ["build-recompilation"]

  ###############################################################################
  # Stage 5: Deploy to Cloud Run (parallel after all pushes complete)
  #
  # Uses `gcloud run services update` (not `deploy`) so we only update the
  # container image — Terraform manages all other configuration (env vars,
  # scaling, IAM). This prevents Cloud Build from overwriting Terraform-managed
  # settings.
  #
  # If the service doesn't exist yet, run `terraform apply` first to create it,
  # then Cloud Build handles subsequent image updates.
  ###############################################################################

  - id: "deploy-ingestion"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update"
      - "sacto-wcag-${_ENVIRONMENT}-ingestion"
      - "--image=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ingestion:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--project=${_PROJECT_ID}"
      # Inject Adobe secrets at deploy time — never stored in Terraform or image
      - "--update-secrets=WCAG_ADOBE_CLIENT_ID=adobe-client-id:latest,WCAG_ADOBE_CLIENT_SECRET=adobe-client-secret:latest"
      # Tag the new revision with the commit SHA for easy rollback
      - "--tag=commit-${_IMAGE_TAG}"
      # Route 100% of traffic to the new revision
      - "--traffic=LATEST=100"
    waitFor: ["push-ingestion", "push-extraction", "push-ai-drafting", "push-recompilation"]

  - id: "deploy-extraction"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update"
      - "sacto-wcag-${_ENVIRONMENT}-extraction"
      - "--image=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-extraction:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--project=${_PROJECT_ID}"
      - "--update-secrets=WCAG_ADOBE_CLIENT_ID=adobe-client-id:latest,WCAG_ADOBE_CLIENT_SECRET=adobe-client-secret:latest"
      - "--tag=commit-${_IMAGE_TAG}"
      - "--traffic=LATEST=100"
    waitFor: ["push-ingestion", "push-extraction", "push-ai-drafting", "push-recompilation"]

  - id: "deploy-ai-drafting"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update"
      - "sacto-wcag-${_ENVIRONMENT}-ai-drafting"
      - "--image=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-ai-drafting:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--project=${_PROJECT_ID}"
      - "--tag=commit-${_IMAGE_TAG}"
      - "--traffic=LATEST=100"
    waitFor: ["push-ingestion", "push-extraction", "push-ai-drafting", "push-recompilation"]

  - id: "deploy-recompilation"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "gcloud"
    args:
      - "run"
      - "services"
      - "update"
      - "sacto-wcag-${_ENVIRONMENT}-recompilation"
      - "--image=${_GCR_HOSTNAME}/${_PROJECT_ID}/sacto-wcag-recompilation:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--project=${_PROJECT_ID}"
      - "--update-secrets=WCAG_ADOBE_CLIENT_ID=adobe-client-id:latest,WCAG_ADOBE_CLIENT_SECRET=adobe-client-secret:latest"
      - "--tag=commit-${_IMAGE_TAG}"
      - "--traffic=LATEST=100"
    waitFor: ["push-ingestion", "push-extraction", "push-ai-drafting", "push-recompilation"]

  ###############################################################################
  # Stage 6: Smoke test — verify health endpoints on all deployed services
  #
  # Calls /health on the ingestion service (the only public service).
  # Internal services are verified via their Cloud Run revision status.
  # A non-200 response from /health fails the build and triggers a rollback alert.
  ###############################################################################

  - id: "smoke-test"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        # Retrieve the ingestion service URL
        INGESTION_URL=$(gcloud run services describe \
          sacto-wcag-${_ENVIRONMENT}-ingestion \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --format="value(status.url)")

        echo "Smoke testing ingestion service at: $INGESTION_URL"

        # Retry up to 5 times with 10s delay — Cloud Run may take a moment to
        # route traffic to the new revision
        for i in 1 2 3 4 5; do
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $(gcloud auth print-identity-token)" \
            "${INGESTION_URL}/health")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check PASSED (HTTP $HTTP_STATUS)"
            exit 0
          fi

          echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 10s..."
          sleep 10
        done

        echo "SMOKE TEST FAILED: /health returned HTTP $HTTP_STATUS after 5 attempts"
        echo "Check Cloud Run logs: gcloud run services logs read sacto-wcag-${_ENVIRONMENT}-ingestion --region=${_REGION}"
        exit 1
    waitFor: ["deploy-ingestion", "deploy-extraction", "deploy-ai-drafting", "deploy-recompilation"]

# Artifacts: store build logs and test results in GCS for audit trail
# Uncomment and set a GCS bucket to enable artifact storage:
# artifacts:
#   objects:
#     location: "gs://sacto-wcag-build-artifacts/${COMMIT_SHA}"
#     paths:
#       - "test-results/**"
#       - "coverage/**"

# Timeout: 30 minutes covers the full build+push+deploy cycle.
# Adobe SDK pip install is slow (~5 min); parallel builds help.
timeout: "1800s"
